# App of Apps Pattern
# This template generates ArgoCD Applications for each enabled component

{{- if .Values.components.webTerminalOperator.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webterminal-operator
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/operator
    helm:
      valuesObject:
        operator:
          enabled: {{ .Values.components.webTerminalOperator.enabled }}
          name: {{ .Values.components.webTerminalOperator.name }}
          namespace: {{ .Values.components.webTerminalOperator.namespace }}
          channel: {{ .Values.components.webTerminalOperator.channel }}
          source: {{ .Values.components.webTerminalOperator.source }}
          sourceNamespace: {{ .Values.components.webTerminalOperator.sourceNamespace }}
          installPlanApproval: {{ .Values.components.webTerminalOperator.installPlanApproval }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.webTerminalOperator.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}

