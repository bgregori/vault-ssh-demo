{{- if .Values.components.lightspeedConfig.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-lightspeed-config
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/lightspeed-config
    helm:
      valuesObject:
        demo:
          enabled: {{ .Values.components.lightspeedConfig.enabled }}
          namespace: {{ .Values.components.lightspeedConfig.namespace }}
        deployer:
          domain: {{ .Values.deployer.domain | quote }}
        litemaas:
          apiUrl: {{ .Values.litemaas.apiUrl }}
          apiKey: {{ .Values.litemaas.apiKey }}
          model: {{ .Values.litemaas.model }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.lightspeedConfig.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}

{{- if .Values.components.vault.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-vault
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.components.vault.repoURL }}
    chart: {{ .Values.components.vault.chart }}
    targetRevision: 0.32.0
    path: 
    helm:
      valuesObject:
        global:
          openshift: true
        injector:
          image:
            repository: "registry.connect.redhat.com/hashicorp/vault-k8s"
            tag: "1.7.2-ubi"
          agentImage:
            repository: "registry.connect.redhat.com/hashicorp/vault"
            tag: "1.21.2-ubi"
        server:
          dev:
            enabled: true
          image:
            repository: "registry.connect.redhat.com/hashicorp/vault"
            tag: "1.21.2-ubi"
          readinessProbe:
            path: "/v1/sys/health?uninitcode=204"
        csi:
          image:
            repository: "registry.connect.redhat.com/hashicorp/vault-csi-provider"
            tag: "1.7.0-ubi"
          agent:
            image:
              repository: "registry.connect.redhat.com/hashicorp/vault"
              tag: "1.21.2-ubi"               
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.vault.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
