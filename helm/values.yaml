# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts
  repoUrl: "https://github.com/bgregori/vault-ssh-demo.git"
  revision: "main"
  basePath: "helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Lightspeed Configuration ---
  lightspeedConfig:
    enabled: true
    namespace: openshift-lightspeed

  # --- Operator Installation ---
  webTerminalOperator:
    # Set to true to install the operator via OLM
    # Set to false if operator is already installed on cluster
    enabled: true
    name: web-terminal
    namespace: openshift-operators
    channel: fast
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  vaultSecretsOperator:
    enabled: true
    name: vault-secrets-operator
    namespace: openshift-operators
    channel: stable
    source: certified-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  # --- Vault 
  vault:
    enabled: true
    appName: vault
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    namespace: vault

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

litemaas:
  apiUrl: ""
  apiKey: ""
  model: ""

fieldContent:
  deploymentType: "helm"
